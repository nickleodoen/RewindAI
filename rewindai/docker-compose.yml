services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/rewindai
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
  # Demo-safe default: keep only Neo4j running so the app is not blocked on a
  # stale RocketRide image. Re-enable RocketRide later if needed with:
  #
  # rocketride:
  #   image: ghcr.io/rocketride-org/rocketride-engine:latest
  #   ports:
  #     - "5565:5565"
  #   volumes:
  #     - ./pipelines:/app/pipelines
  #   environment:
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
volumes:
  neo4j_data:
