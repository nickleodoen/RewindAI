services:
  neo4j:
    image: neo4j:5-community
    container_name: rewindai-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rocketride:
    image: rocketrideorg/rocketride-server:latest
    container_name: rewindai-rocketride
    ports:
      - "5565:5565"
    volumes:
      - ./pipelines:/app/pipelines
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=5565
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
